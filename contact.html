<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Spicy Burger Palace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">Our Story</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Find Us</a>
    </nav>

    <div class="container">
        <h1>Find Us & Get in Touch</h1>

        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <h3>Location</h3>
                <p>123 Inferno Street, Chili District<br>Flavor City, FC 56789</p>

                <h3>Opening Hours</h3>
                <p>Mon - Fri: 11:00 AM - 10:00 PM<br>Sat - Sun: 10:00 AM - Midnight</p>
            </div>

            <div style="flex: 1; min-width: 300px; background: #222; padding: 20px; border-radius: 8px;">
                <h3>Send us a Message</h3>
                <form>
                    <label>Name:</label><br>
                    <input type="text" placeholder="Your Name" style="width: 100%; padding: 8px; margin: 10px 0;"><br>

                    <label>Email:</label><br>
                    <input type="email" placeholder="Your Email" style="width: 100%; padding: 8px; margin: 10px 0;"><br>

                    <label>Message:</label><br>
                    <textarea placeholder="Your Feedback" style="width: 100%; padding: 8px; margin: 10px 0; height: 100px;"></textarea><br>

                    <button type="button" style="background:#990000; color:white; padding:10px 20px; border:none; cursor:pointer; width: 100%;">Submit</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
